 <script>
    window.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const type = urlParams.get('type');
      console.log("当前 type =", type); // 你可以在控制台看是否正确

      if (type === 'demo') {
        document.getElementById('title1').innerText = 'Request a Demo';
        document.getElementById('title2').innerText = 'See our AI in action';
        document.getElementById('dynamic_subject').value = 'New Demo Request';
      } else if (type === 'inquiry') {
        document.getElementById('title1').innerText = 'Business Inquiry';
        document.getElementById('title2').innerText = 'Let’s work together';
        document.getElementById('dynamic_subject').value = 'New Business Inquiry';
