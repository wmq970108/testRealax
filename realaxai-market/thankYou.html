<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Realax AI</title>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Archivo', Inter Tight, sans-serif;
    }
    body {
      background-color: #0F1118;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      text-align: center;
    }
    .thank-box {
      max-width: 600px;
      width: 100%;
      padding: 70px 40px;
      border: 1px solid #2A2D3A;
      border-radius: 20px;
      background: #12151E;
    }
    .check-icon {
      width: 70px;
      height: 70px;
      background: #10B981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
    }
    .check-icon svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    p {
      font-size: 17px;
      color: #A1A4B2;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn-back {
      display: inline-block;
      padding: 14px 36px;
      border: 1px solid #fff;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
    }
    .btn-back:hover {
      background: #fff;
      color: #0F1118;
    }
  </style>
</head>
<body>
  <div class="thank-box">
    <div class="check-icon">
      <svg viewBox="0 0 24 24">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path>
      </svg>
    </div>
    <h1>Thank You!</h1>
    <p>Your message has been successfully submitted. Our team will get back to you shortly.</p>
    <a href="./" class="btn-back">Return to Home</a>
  </div>
</body>
</html>
